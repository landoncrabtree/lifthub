services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    volumes:
      - sqlite-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/app/data/gym.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    entrypoint: ["sh", "-c", "cp -r /app/dist/* /srv/frontend/ && echo 'Frontend assets copied' && tail -f /dev/null"]
    volumes:
      - frontend-assets:/srv/frontend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - frontend-assets:/srv/frontend:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  sqlite-data:
  frontend-assets:
  caddy-data:
  caddy-config:
