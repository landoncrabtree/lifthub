services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/app/data/gym.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    entrypoint: ["sh", "-c", "cp -r /app/dist/* /srv/frontend/ && echo 'Frontend assets copied' && tail -f /dev/null"]
    volumes:
      - frontend-assets:/srv/frontend
    restart: unless-stopped

  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8443:8443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - frontend-assets:/srv/frontend:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  frontend-assets:
  caddy-data:
  caddy-config:
