services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=dev-secret-change-me
      - DB_PATH=/app/data/gym.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    entrypoint: ["sh", "-c", "cp -r /app/dist/* /srv/frontend/ && echo 'Frontend assets copied' && tail -f /dev/null"]
    volumes:
      - frontend-assets:/srv/frontend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile
      - frontend-assets:/srv/frontend:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=localhost
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  frontend-assets:
  caddy-data:
  caddy-config:
