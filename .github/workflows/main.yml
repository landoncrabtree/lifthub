name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -t rsa ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.REPO_PATH }}
            git fetch https://${{ secrets.GIT_PAT }}@github.com/landoncrabtree/lifthub.git main
            git reset --hard FETCH_HEAD
            sudo docker compose down
            sudo docker compose build
            sudo docker compose up -d --force-recreate --remove-orphans
          EOF
      
      - name: Wait for everything to be ready
        run: sleep 15

      - name: Health check
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "curl -fsSI --retry 15 --retry-delay 2 --retry-connrefused https://gym.landon.pw:8443 --resolve gym.landon.pw:8443:127.0.0.1"
          echo "Health check passed."